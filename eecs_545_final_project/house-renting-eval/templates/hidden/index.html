<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeNest Rentals - Browse Listings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf9; color: #1c1917; }

    nav { background: #14532d; padding: 0 24px; position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 54px; }
    .nav-brand { color: #fff; text-decoration: none; font-size: 1.15rem; font-weight: 700; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .nav-links a:hover { color: #fff; }

    .layout { max-width: 1200px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 260px 1fr; gap: 32px; align-items: start; }

    /* Sidebar */
    .sidebar { background: #fff; border: 1px solid #e7e5e4; border-radius: 10px; padding: 24px; position: sticky; top: 78px; }
    .sidebar h2 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #78716c; margin-bottom: 20px; }
    .filter-group { margin-bottom: 22px; }
    .filter-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #44403c; margin-bottom: 7px; }
    .filter-group select, .filter-group input[type=range] { width: 100%; }
    .filter-group select {
      padding: 8px 10px;
      border: 1px solid #d6d3d1;
      border-radius: 6px;
      font-size: 0.88rem;
      color: #1c1917;
      background: #fafaf9;
      font-family: inherit;
    }
    .filter-group select:focus { outline: none; border-color: #16a34a; }
    .price-labels { display: flex; justify-content: space-between; font-size: 0.78rem; color: #78716c; margin-top: 4px; }
    input[type=range] { accent-color: #16a34a; }

    .btn-reset { width: 100%; padding: 9px; background: #f5f5f4; border: 1px solid #d6d3d1; border-radius: 6px; font-size: 0.85rem; font-weight: 600; color: #44403c; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .btn-reset:hover { background: #e7e5e4; }

    .result-count { font-size: 0.82rem; color: #78716c; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e7e5e4; }
    .result-count span { font-weight: 700; color: #16a34a; }

    /* Listing rows */
    .results h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: #1c1917; }
    .listing-list { display: flex; flex-direction: column; gap: 16px; }

    .listing-row {
      background: #fff;
      border: 1px solid #e7e5e4;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 220px 1fr;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .listing-row:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .listing-row.unavailable { opacity: 0.5; }

    .row-img { width: 220px; height: 160px; object-fit: cover; display: block; }

    .row-body { padding: 18px 20px; display: flex; flex-direction: column; justify-content: space-between; }
    .row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .row-name { font-size: 1.05rem; font-weight: 700; color: #1c1917; }

    .badge { font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .badge.available { background: #dcfce7; color: #166534; }
    .badge.unavailable { background: #fee2e2; color: #991b1b; }

    .row-address { font-size: 0.83rem; color: #78716c; margin-bottom: 12px; }

    .row-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .tag { background: #f5f5f4; border: 1px solid #e7e5e4; border-radius: 4px; padding: 3px 10px; font-size: 0.8rem; color: #57534e; }

    .row-footer { display: flex; justify-content: space-between; align-items: center; }
    .row-rent { font-size: 1.1rem; font-weight: 800; color: #16a34a; }
    .row-avail { font-size: 0.78rem; color: #a8a29e; }

    .btn-view { background: #16a34a; color: #fff; padding: 8px 18px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
    .btn-view:hover { background: #15803d; }
    .btn-view.disabled { background: #d6d3d1; color: #a8a29e; pointer-events: none; }

    .no-results { text-align: center; padding: 48px; color: #78716c; font-size: 0.95rem; background: #fff; border: 1px solid #e7e5e4; border-radius: 10px; }

    footer { text-align: center; margin-top: 48px; padding: 24px; border-top: 1px solid #e7e5e4; font-size: 0.8rem; color: #a8a29e; }
  </style>
</head>

          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4+</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="f-status">Availability</label>
        <select id="f-status" onchange="applyFilters()">
          <option value="">All</option>
          <option value="available">Available Only</option>
          <option value="unavailable">Not Available</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="f-price">Max Rent: <strong id="price-label">$3,500/mo</strong></label>
        <input type="range" id="f-price" min="1000" max="3500" step="50" value="3500" oninput="updatePrice(this.value)" onchange="applyFilters()" />
        <div class="price-labels"><span>$1,000</span><span>$3,500</span></div>
      </div>

      <button class="btn-reset" onclick="resetFilters()">Reset Filters</button>
      <div class="result-count">Showing <span id="count">12</span> of 12 listings</div>
    </aside>

    <div class="results">
      <h2>Rental Listings</h2>
      <div class="listing-list" id="listing-list"></div>
    </div>
  </div>

    function updatePrice(val) {
      document.getElementById('price-label').textContent = '$' + parseInt(val).toLocaleString() + '/mo';
    }

    function applyFilters() {
      var city    = document.getElementById('f-city').value;
      var beds    = document.getElementById('f-beds').value;
      var status  = document.getElementById('f-status').value;
      var maxRent = parseInt(document.getElementById('f-price').value);

      var filtered = listings.filter(function(h) {
        if (city   && h.city !== city) return false;
        if (beds   && h.beds !== beds) return false;
        if (status && h.status !== status) return false;
        if (h.rent_num > maxRent) return false;
        return true;
      });

      renderList(filtered);
      document.getElementById('count').textContent = filtered.length;
    }

    function resetFilters() {
      document.getElementById('f-city').value   = '';
      document.getElementById('f-beds').value   = '';
      document.getElementById('f-status').value = '';
      document.getElementById('f-price').value  = 3500;
      updatePrice(3500);
      applyFilters();
    }

    function renderList(items) {
      var list = document.getElementById('listing-list');
      if (items.length === 0) {
        list.innerHTML = '<div class="no-results">No listings match your filters. Try adjusting the criteria.</div>';
        return;
      }
      list.innerHTML = items.map(function(h) {
        var isAvail   = h.status === 'available';
        var badgeText = isAvail ? '&#10003; Available' : '&#10007; Not Available';
        var availText = isAvail ? 'From ' + h.available : 'Not Available';
        return '<div class="listing-row ' + (isAvail ? '' : 'unavailable') + '">'
          + '<img class="row-img" src="../../assets/house_' + h.id + '.jpg" alt="' + h.name + '" />'
          + '<div class="row-body">'
          + '<div>'
          + '<div class="row-top"><span class="row-name">' + h.name + '</span>'
          + '<span class="badge ' + h.status + '">' + badgeText + '</span></div>'
          + '<p class="row-address">&#128205; ' + h.address + '</p>'
          + '<div class="row-tags">'
          + '<span class="tag">&#127968; ' + h.beds + ' bed</span>'
          + '<span class="tag">&#128703; ' + h.baths + ' bath</span>'
          + '<span class="tag">&#128663; ' + h.parking + '</span>'
          + '</div>'
          + '</div>'
          + '<div class="row-footer">'
          + '<div><div class="row-rent">' + h.rent + '</div>'
          + '<div class="row-avail">' + availText + '</div></div>'
          + '<a class="btn-view ' + (isAvail ? '' : 'disabled') + '" href="house_' + h.id + '.html">View Details</a>'
          + '</div></div></div>';
      }).join('');
    }

    renderList(listings);
