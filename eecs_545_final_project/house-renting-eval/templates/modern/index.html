    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }

    nav {
      background: #2563eb;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(37,99,235,0.3);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 56px;
    }
    .nav-brand {
      color: #fff;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
    }
    .nav-links a:hover { color: #fff; }

    .hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: #fff;
      text-align: center;
      padding: 56px 20px 48px;
    }
    .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
    .hero p { font-size: 1rem; opacity: 0.88; }

    .page-body { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.13); }
    .card.unavailable { opacity: 0.55; }

    .card-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .card-name { font-size: 1.05rem; font-weight: 700; color: #1e293b; }
    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge.available { background: #dcfce7; color: #166534; }
    .badge.unavailable { background: #fee2e2; color: #991b1b; }

    .card-address { font-size: 0.83rem; color: #64748b; margin-bottom: 16px; }

    .card-stats {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.82rem;
      color: #475569;
      font-weight: 500;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid #f1f5f9;
    }
    .card-rent { font-size: 1.15rem; font-weight: 800; color: #2563eb; }
    .card-avail { font-size: 0.78rem; color: #94a3b8; }

    .btn-view {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
    }
    .btn-view:hover { background: #1d4ed8; }
    .btn-view.disabled {
      background: #cbd5e1;
      color: #94a3b8;
      pointer-events: none;
      cursor: not-allowed;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }
    .page-info { font-size: 0.88rem; color: #64748b; }
    .page-btns { display: flex; gap: 10px; }
    .page-btn {
      background: #fff;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
    }
    .page-btn:hover { background: #2563eb; color: #fff; border-color: #2563eb; }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; background: #fff; color: #1e293b; }

    footer {
      text-align: center;
      margin-top: 56px;
      padding: 24px;
      border-top: 1px solid #e2e8f0;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>

    const PER_PAGE = 4;
    let currentPage = 0;
    const totalPages = Math.ceil(listings.length / PER_PAGE);

    function renderPage() {
      const grid = document.getElementById('listing-grid');
      const start = currentPage * PER_PAGE;
      const slice = listings.slice(start, start + PER_PAGE);
      grid.innerHTML = slice.map(function(h) {
        var isAvail = h.status === 'available';
        var badgeClass = isAvail ? 'available' : 'unavailable';
        var badgeText  = isAvail ? '&#10003; Available' : '&#10007; Not Available';
        var btnClass   = isAvail ? '' : 'disabled';
        var availText  = isAvail ? ('From ' + h.available) : 'Not Available';
        return '<div class="card ' + (isAvail ? '' : 'unavailable') + '">'
          + '<img class="card-img" src="../../assets/house_' + h.id + '.jpg" alt="' + h.name + '" />'
          + '<div class="card-body">'
          + '<div class="card-top">'
          + '<span class="card-name">' + h.name + '</span>'
          + '<span class="badge ' + badgeClass + '">' + badgeText + '</span>'
          + '</div>'
          + '<p class="card-address">&#128205; ' + h.address + '</p>'
          + '<div class="card-stats">'
          + '<span class="stat">&#127968; ' + h.beds + ' bed</span>'
          + '<span class="stat">&#128703; ' + h.baths + ' bath</span>'
          + '</div>'
          + '<div class="card-footer">'
          + '<div><div class="card-rent">' + h.rent + '</div>'
          + '<div class="card-avail">' + availText + '</div></div>'
          + '<a class="btn-view ' + btnClass + '" href="house_' + h.id + '.html">View Details</a>'
          + '</div>'
          + '</div></div>';
      }).join('');

      document.getElementById('page-info').textContent =
        'Showing ' + (start+1) + '-' + Math.min(start+PER_PAGE, listings.length) + ' of ' + listings.length + ' listings';
      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage === totalPages - 1;
    }

    function changePage(dir) {
      currentPage += dir;
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderPage();
